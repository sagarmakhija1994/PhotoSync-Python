{% extends "base.html" %}
{% block title %}Create User | PhotoSync{% endblock %}

{% block content %}
<div class="card card-sm">
    <h2 style="margin-bottom: 24px;">Create New User</h2>

    <form method="post">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
            <input type="checkbox" name="is_admin" style="width: auto; margin: 0;">
            Admin User Privileges
        </label>

        <label>Account Status</label>
        <select name="status">
            <option value="ACTIVE">ACTIVE</option>
            <option value="PENDING">PENDING</option>
        </select>

        <button type="submit" class="btn btn-primary btn-full">Create User</button>
    </form>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}
</div>
{% endblock %}
